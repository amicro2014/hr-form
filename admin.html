<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>管理后台 - 人事档案资料卡</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:"Microsoft YaHei",sans-serif;background:#e8e8e8;padding:20px 8px;font-size:13px}
.page{max-width:1050px;margin:0 auto;background:#fff;padding:30px 35px 25px;box-shadow:0 2px 12px rgba(0,0,0,.15)}
h2{text-align:center;margin-bottom:18px;font-size:20px}
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;margin-bottom:16px}
.st{border:1px solid #ddd;border-radius:6px;padding:14px;text-align:center}
.st .n{font-size:28px;font-weight:bold;color:#1a56db}
.st .l{font-size:12px;color:#666;margin-top:4px}
.fb{display:flex;gap:10px;margin-bottom:14px;flex-wrap:wrap;align-items:center}
.fb input{padding:6px 10px;border:1px solid #d1d5db;border-radius:4px;font-size:13px;font-family:inherit;flex:1;min-width:150px}
.btn{padding:6px 14px;border:1px solid #d1d5db;background:#fff;border-radius:4px;cursor:pointer;font-size:13px;font-family:inherit}
.btn.p{background:#1a56db;color:#fff;border-color:#1a56db}
.btn.d{color:#dc2626;border-color:#dc2626}
.btn.s{background:#059669;color:#fff;border-color:#059669}
.tb{overflow-x:auto;border:1px solid #ddd;border-radius:4px}
.tb table{width:100%;border-collapse:collapse;font-size:12px}
.tb th{background:#f9fafb;font-weight:600;padding:8px 10px;text-align:left;white-space:nowrap;border-bottom:2px solid #ddd}
.tb td{padding:8px 10px;border-bottom:1px solid #eee;white-space:nowrap}
.tb tr:hover{background:#f0f7ff}
.pg{display:flex;justify-content:center;align-items:center;gap:8px;margin-top:16px}
.pg button{padding:6px 14px;border:1px solid #ddd;background:#fff;border-radius:4px;cursor:pointer;font-size:13px}
.pg button:disabled{opacity:.4}
.mo{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;z-index:1000}
.md{background:#fff;border-radius:12px;width:90%;max-width:850px;max-height:85vh;overflow-y:auto}
.mdh{padding:16px 24px;border-bottom:1px solid #ddd;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;background:#fff;z-index:1}
.mdh h3{font-size:18px}
.mdc{width:32px;height:32px;border:none;background:#f3f4f6;border-radius:50%;font-size:18px;cursor:pointer}
.mdb{padding:24px}
.ir{display:flex;margin-bottom:8px}
.il{width:130px;flex-shrink:0;font-weight:600;color:#374151}
.iv{color:#111}
.ss{margin-top:18px;padding-top:14px;border-top:1px solid #e5e7eb}
.ss h4{font-size:15px;color:#1a56db;margin-bottom:10px}
.toast{position:fixed;top:20px;right:20px;padding:10px 20px;border-radius:4px;color:#fff;font-size:14px;z-index:9999;animation:si .3s ease}
.toast.ok{background:#059669}.toast.er{background:#dc2626}.toast.if{background:#1a56db}
@keyframes si{from{transform:translateX(100%);opacity:0}to{transform:translateX(0);opacity:1}}
.pw-box{max-width:360px;margin:60px auto;text-align:center}
.pw-box h2{margin-bottom:20px}
.pw-box input{width:100%;padding:10px;border:1px solid #d1d5db;border-radius:4px;font-size:14px;font-family:inherit;margin-bottom:12px}
.pw-box .btn.p{width:100%;padding:10px}
@media(max-width:640px){.page{padding:20px 12px}}
</style>
</head>
<body>
<div class="page" id="pwPage">
  <div class="pw-box">
    <h2>管理后台</h2>
    <input type="password" id="pwInput" placeholder="请输入管理密码" onkeyup="if(event.key==='Enter')login()">
    <button class="btn p" onclick="login()">登 录</button>
  </div>
</div>
<div class="page" id="adminPage" style="display:none">
  <h2>人事档案资料卡统计系统</h2>
  <div style="text-align:right;margin-bottom:12px"><button class="btn s" onclick="exportCSV()">导出CSV</button></div>
  <div class="stats">
    <div class="st"><div class="n" id="sT">0</div><div class="l">总提交数</div></div>
    <div class="st"><div class="n" id="sD">0</div><div class="l">涉及部门</div></div>
    <div class="st"><div class="n" id="sO">0</div><div class="l">户外协会</div></div>
    <div class="st"><div class="n" id="sB">0</div><div class="l">大球协会</div></div>
    <div class="st"><div class="n" id="sBd">0</div><div class="l">羽毛球协会</div></div>
    <div class="st"><div class="n" id="sC">0</div><div class="l">露营协会</div></div>
  </div>
  <div class="fb">
    <input type="text" id="sI" placeholder="搜索姓名、工号、部门..." onkeyup="if(event.key==='Enter')ld(1)">
    <button class="btn p" onclick="ld(1)">搜索</button>
    <span id="rC" style="margin-left:auto;font-size:12px;color:#666"></span>
  </div>
  <div class="tb">
    <table><thead><tr><th>ID</th><th>提交时间</th><th>姓名</th><th>部门</th><th>职位</th><th>工号</th><th>入职日期</th><th>操作</th></tr></thead>
    <tbody id="tB"><tr><td colspan="8" style="text-align:center;padding:40px;color:#999">加载中...</td></tr></tbody></table>
  </div>
  <div class="pg" id="pC"></div>
</div>
<div class="mo" id="dm" style="display:none" onclick="if(event.target===this)cl()">
  <div class="md"><div class="mdh"><h3 id="dmT"></h3><button class="mdc" onclick="cl()">x</button></div><div class="mdb" id="dmB"></div></div>
</div>
<script src="admin.js"></script>
</body>
</html>
